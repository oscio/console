apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-web
  labels:
    agent-platform/component: console
    agent-platform/role: web
    app.kubernetes.io/instance: console
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      agent-platform/role: web
      app.kubernetes.io/instance: console
  template:
    metadata:
      labels:
        agent-platform/component: console
        agent-platform/role: web
        app.kubernetes.io/instance: console
        app.kubernetes.io/name: console
        app.kubernetes.io/part-of: agent-platform
    spec:
      imagePullSecrets:
        - name: console-harbor-pull
      containers:
        - name: web
          image: cr.dev.openschema.io/agent-platform/console-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/platform/ca.crt
          envFrom:
            - secretRef:
                name: console-secret
            - configMapRef:
                name: console-env
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: platform-ca
              mountPath: /etc/ssl/platform
              readOnly: true
      volumes:
        - name: platform-ca
          configMap:
            name: console-platform-ca
